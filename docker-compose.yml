# ──────────────────────────────────────────────────────────────
# VibeVoca — Docker Compose
# Services: app (FastAPI/uvicorn) + db (PostgreSQL 16)
# ──────────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── PostgreSQL 16 ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: vibevoca_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibevoca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibevoca_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vibevoca}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"        # 로컬 5433 → 컨테이너 5432 (로컬 PG 충돌 방지)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibevoca} -d ${POSTGRES_DB:-vibevoca}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vibevoca_net

  # ── FastAPI Application ──────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibevoca_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db          # docker 네트워크 내 서비스명 사용
      POSTGRES_PORT: 5432
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level info --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app           # 개발 시 hot-reload 지원 (선택적)
    networks:
      - vibevoca_net

volumes:
  postgres_data:
    driver: local

networks:
  vibevoca_net:
    driver: bridge
